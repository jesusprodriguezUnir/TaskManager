<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />

    <!-- Canonical + indexing hints -->
    <link rel="canonical" href="%VITE_SITE_URL%/" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <!-- Google Search Console site verification token (set PUBLIC_GOOGLE_SITE_VERIFICATION
         in .env.docker → flows through to VITE_GOOGLE_SITE_VERIFICATION at build time).
         Empty content tag is harmless if unset. -->
    <meta name="google-site-verification" content="%VITE_GOOGLE_SITE_VERIFICATION%" />

    <!-- Icons: theme-aware SVG wins the browser tab; PNG tiles for Google search + PWA + Apple home screen.
         The 48×48 PNG is what Google's search-result favicon picker uses. -->
    <link rel="icon" type="image/svg+xml" sizes="any" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Theme + description -->
    <meta name="theme-color" content="#f3ebd8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1512" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <meta name="application-name" content="%VITE_SITE_NAME%" />
    <meta name="description" content="Self-hostable personal study dashboard. Track courses, lectures, deadlines, and topics — with a built-in MCP server so Claude can read and update it from your browser, phone, and Claude Code." />
    <meta name="keywords" content="study dashboard, self-hosted, student productivity, Claude MCP, Model Context Protocol, course tracker, semester planner, open source" />

    <!-- Open Graph / Twitter -->
    <meta property="og:site_name" content="%VITE_SITE_NAME%" />
    <meta property="og:title" content="%VITE_SITE_NAME% — self-hostable study dashboard" />
    <meta property="og:description" content="Track courses, lectures, deadlines, and topics — with a built-in MCP server so Claude can read and update it from your browser, phone, and Claude Code." />
    <meta property="og:image" content="%VITE_SITE_URL%/og-card.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="%VITE_SITE_NAME% wordmark" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="%VITE_SITE_URL%/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="de_DE" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%VITE_SITE_NAME% — self-hostable study dashboard" />
    <meta name="twitter:description" content="Track courses, lectures, deadlines, and topics — with a built-in MCP server for Claude." />
    <meta name="twitter:image" content="%VITE_SITE_URL%/og-card.png" />
    <meta name="twitter:image:alt" content="%VITE_SITE_NAME% wordmark" />

    <!-- hreflang — sitemap has them too, but Google prefers seeing them in
         HTML head as well. Helps en/de targeting. -->
    <link rel="alternate" hreflang="en" href="%VITE_SITE_URL%/" />
    <link rel="alternate" hreflang="de" href="%VITE_SITE_URL%/de" />
    <link rel="alternate" hreflang="x-default" href="%VITE_SITE_URL%/" />

    <!-- schema.org — @graph lets us declare both Organization and the
         SoftwareApplication as linked entities, so Google can attach the
         GitHub link / logo to a single org profile. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "%VITE_SITE_URL%/#organization",
            "name": "%VITE_SITE_NAME%",
            "url": "%VITE_SITE_URL%/",
            "logo": "%VITE_SITE_URL%/icon-512.png",
            "sameAs": ["https://github.com/openstudy-dev/OpenStudy"]
          },
          {
            "@type": "SoftwareApplication",
            "@id": "%VITE_SITE_URL%/#app",
            "name": "%VITE_SITE_NAME%",
            "url": "%VITE_SITE_URL%/",
            "description": "Self-hostable personal study dashboard with a built-in Model Context Protocol server for Claude.",
            "image": "%VITE_SITE_URL%/og-card.png",
            "applicationCategory": "EducationalApplication",
            "applicationSubCategory": "ProductivityApplication",
            "operatingSystem": "Web, iOS, Android",
            "license": "https://opensource.org/licenses/MIT",
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
            "inLanguage": ["en", "de"],
            "publisher": { "@id": "%VITE_SITE_URL%/#organization" },
            "sameAs": ["https://github.com/openstudy-dev/OpenStudy"],
            "screenshot": [
              "%VITE_SITE_URL%/screenshots/theme-classic.png",
              "%VITE_SITE_URL%/screenshots/theme-zine.png",
              "%VITE_SITE_URL%/screenshots/theme-library.png",
              "%VITE_SITE_URL%/screenshots/theme-swiss.png"
            ]
          }
        ]
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Single combined font request covering ALL themes (editorial, terminal,
         zine, library, swiss). Loading them up-front means switching themes
         later doesn't kick off a fresh CSS+woff2 fetch chain — the browser
         pulls the new face out of cache instead of flashing fallback type. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600&family=Work+Sans:wght@400;500;600;700;800;900&family=Caveat:wght@500;600;700&family=DM+Mono:wght@400;500&family=Special+Elegant&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap"
      rel="stylesheet"
    />
    <title>%VITE_SITE_NAME%</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
