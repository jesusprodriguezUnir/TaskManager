<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>The Saleh Register — SoSe MMXXVI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elegant&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* =========================================================================
   THE SALEH REGISTER — archival / library
   cream paper · sepia-brown ink · typewriter body · tabular numerals
   rules between sections · roman-numeral section marks · subtle paper texture
   ========================================================================= */
:root {
  --paper:    #f2ead6;
  --paper-2:  #ecdfc4;
  --paper-3:  #e3d3ae;
  --rule:     #2a1f15;
  --ink:      #2a1f15;
  --ink-2:    #5a4531;
  --ink-3:    #8b7254;
  --ink-4:    #b89b77;

  --sepia:    #7a4c1f;
  --sepia-2:  #5d3412;
  --red:      #a03b2a;
  --green:    #4c6b3a;
  --blue:     #304f6e;
  --mustard:  #b38a28;

  /* course accents — earthy library plates */
  --course-asb: #304f6e;   /* prussian blue */
  --course-rn:  #4c6b3a;   /* forest green */
  --course-ra:  #b38a28;   /* mustard */
  --course-aml: #a03b2a;   /* oxblood */
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: "Special Elegant", "Courier Prime", ui-monospace, monospace;
  font-size: 14px;
  line-height: 1.55;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  /* paper texture */
  background-image:
    radial-gradient(rgba(42,31,21,0.035) 1px, transparent 1.4px),
    radial-gradient(rgba(122,76,31,0.04) 1px, transparent 1px);
  background-size: 7px 7px, 31px 29px;
}
::selection { background: rgba(122,76,31,0.3); color: var(--ink); }

/* ---- serif uses Cormorant Garamond ---- */
.serif { font-family: "Cormorant Garamond", "EB Garamond", Georgia, serif; font-weight: 500; letter-spacing: 0.005em; }
.serif-it { font-family: "Cormorant Garamond", Georgia, serif; font-style: italic; font-weight: 500; }
.mono { font-family: "IBM Plex Mono", ui-monospace, monospace; font-feature-settings: "tnum"; }

/* ---- shell ---- */
.shell {
  display: grid;
  grid-template-columns: 264px minmax(0, 1fr);
  max-width: 1420px;
  margin: 0 auto;
  align-items: start;
}
@media (max-width: 900px) { .shell { grid-template-columns: 1fr; } }

/* ---- SIDEBAR: card catalog drawer ---- */
aside.lib {
  position: sticky; top: 0;
  height: 100dvh;
  overflow: hidden;
  padding: 24px 18px 20px;
  border-right: 1px solid var(--ink);
  background: var(--paper-2);
  /* faux card-catalog ruled surface */
  background-image:
    repeating-linear-gradient(0deg,
      transparent 0 30px,
      rgba(42,31,21,0.08) 30px 31px);
}
@media (max-width: 900px) { aside.lib { display: none; } }

.lib .plate {
  border: 1px solid var(--ink);
  background: var(--paper);
  padding: 10px 12px 12px;
  text-align: center;
  box-shadow: 2px 2px 0 var(--ink);
}
.lib .plate .sig {
  font-family: "Cormorant Garamond", Georgia, serif;
  font-size: 11px; font-style: italic;
  color: var(--ink-2);
  letter-spacing: 0.02em;
}
.lib .plate .title {
  font-family: "Cormorant Garamond", Georgia, serif;
  font-weight: 600;
  font-size: 20px;
  letter-spacing: 0.02em;
  line-height: 1.05;
  margin: 4px 0 2px;
}
.lib .plate .ornament {
  font-family: "Cormorant Garamond", Georgia, serif;
  font-size: 16px;
  color: var(--sepia);
  letter-spacing: 0.3em;
}
.lib .plate .sub {
  font-size: 9.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-top: 4px;
}

.lib .callnum {
  margin: 14px 0 10px;
  padding: 8px 10px;
  border: 1px dashed var(--ink);
  background: var(--paper);
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 2px 8px;
  font-family: "IBM Plex Mono", monospace;
  font-size: 10px;
  letter-spacing: 0.06em;
  color: var(--ink-2);
}
.lib .callnum b { color: var(--ink); font-weight: 600; }
.lib .callnum .big {
  grid-column: 1 / -1;
  font-size: 15px; font-weight: 600;
  color: var(--ink);
  letter-spacing: 0.08em;
  text-align: center;
  padding: 2px 0;
  border-bottom: 1px dashed var(--ink-3);
  margin-bottom: 4px;
}

.lib .sect {
  margin-top: 16px;
  padding-top: 8px;
  border-top: 1px solid var(--ink);
  font-family: "Cormorant Garamond", Georgia, serif;
  font-style: italic;
  font-size: 13px;
  color: var(--ink-2);
  letter-spacing: 0.02em;
  display: flex; align-items: baseline; gap: 8px;
  margin-bottom: 2px;
}
.lib .sect .rn {
  font-family: "IBM Plex Mono", monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--sepia);
}

.lib .item {
  display: grid;
  grid-template-columns: 22px minmax(0, 1fr) auto;
  align-items: center; gap: 10px;
  padding: 7px 6px;
  cursor: pointer;
  color: var(--ink-2);
  font-size: 13px;
  letter-spacing: 0.005em;
  border-bottom: 1px dotted var(--ink-3);
  min-height: 40px;
}
.lib .item:hover { color: var(--ink); background: rgba(122,76,31,0.06); }
.lib .item[data-active="true"] {
  color: var(--ink);
  background: var(--paper-3);
  font-weight: 600;
}
.lib .item[data-active="true"]::before {
  content: "▸";
  position: absolute;
  margin-left: -14px;
  color: var(--sepia);
}
.lib .item .rn {
  font-family: "IBM Plex Mono", monospace;
  font-size: 9.5px;
  letter-spacing: 0.14em;
  color: var(--ink-3);
  text-align: right;
}
.lib .item .nm {
  min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.lib .item .k {
  font-family: "IBM Plex Mono", monospace;
  font-size: 9.5px;
  color: var(--ink-3);
  letter-spacing: 0.08em;
}

.lib .vol {
  display: grid;
  grid-template-columns: 36px minmax(0, 1fr) auto;
  align-items: center; gap: 10px;
  padding: 8px 6px;
  cursor: pointer;
  border-bottom: 1px dotted var(--ink-3);
  min-width: 0;
  min-height: 44px;
}
.lib .vol:hover { background: rgba(122,76,31,0.06); }
.lib .vol .spine {
  width: 100%; height: 30px;
  background: var(--accent);
  color: var(--paper);
  display: grid; place-items: center;
  font-family: "Cormorant Garamond", Georgia, serif;
  font-weight: 600; font-size: 10px;
  letter-spacing: 0.14em;
  border: 1px solid var(--ink);
  box-shadow: 1.5px 1.5px 0 var(--ink);
}
.lib .vol .meta { min-width: 0; overflow: hidden; }
.lib .vol .nm {
  font-family: "Cormorant Garamond", Georgia, serif;
  font-size: 13px; font-weight: 600;
  letter-spacing: 0.005em;
  line-height: 1.15;
  color: var(--ink);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.lib .vol .ec {
  font-family: "IBM Plex Mono", monospace;
  font-size: 9px;
  color: var(--ink-3);
  letter-spacing: 0.08em;
  margin-top: 1px;
}
.lib .vol .state {
  font-family: "IBM Plex Mono", monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--red);
  font-weight: 600;
  flex: none;
}
.lib .vol .state.ok { color: var(--green); }

.lib .stamp {
  margin-top: 16px;
  padding: 10px 12px;
  border: 2px double var(--red);
  color: var(--red);
  text-align: center;
  font-family: "Cormorant Garamond", Georgia, serif;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  line-height: 1.3;
  transform: rotate(-2deg);
  background: var(--paper);
}
.lib .stamp small {
  display: block;
  font-family: "IBM Plex Mono", monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--ink-3);
  margin-top: 2px;
  font-weight: 400;
}

/* ---- main column ---- */
.page {
  padding: 36px 44px 80px;
  min-width: 0;
  max-width: 1060px;
  margin: 0 auto;
}
@media (max-width: 640px) { .page { padding: 24px 18px 80px; } }

/* ---- MASTHEAD ---- */
.masthead {
  text-align: center;
  padding-bottom: 14px;
  border-bottom: 3px double var(--ink);
  position: relative;
}
.masthead .eyebrow {
  display: flex; justify-content: space-between; align-items: center;
  font-family: "IBM Plex Mono", monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--ink-3);
  text-transform: uppercase;
  padding-bottom: 12px;
}
.masthead .title-0 {
  font-family: "Cormorant Garamond", Georgia, serif;
  font-weight: 600;
  font-size: clamp(36px, 6vw, 64px);
  letter-spacing: 0.01em;
  line-height: 1;
  margin: 4px 0 6px;
  font-variant: small-caps;
}
.masthead .dek {
  font-family: "Cormorant Garamond", Georgia, serif;
  font-style: italic;
  font-size: 17px;
  color: var(--ink-2);
  letter-spacing: 0.01em;
}
.masthead .dek::before,
.masthead .dek::after { content: "—"; margin: 0 8px; color: var(--sepia); }

.masthead .rule-strip {
  margin-top: 10px;
  display: flex; justify-content: space-between;
  font-family: "IBM Plex Mono", monospace;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.masthead .rule-strip b { color: var(--ink); font-weight: 600; }

/* ---- SALUTATION (not "good evening, <name>") ---- */
.salut {
  padding: 34px 0 26px;
  border-bottom: 1px solid var(--ink);
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 22px;
  align-items: end;
}
@media (max-width: 720px) { .salut { grid-template-columns: 1fr; gap: 14px; } }

.salut .drop {
  font-family: "Cormorant Garamond", Georgia, serif;
  font-weight: 600;
  font-size: 110px;
  line-height: 0.78;
  color: var(--sepia);
  padding: 6px 14px 0 0;
  border-right: 1px solid var(--ink-3);
}
@media (max-width: 720px) { .salut .drop { border-right: none; font-size: 82px; } }

.salut .body .from {
  font-family: "Cormorant Garamond", Georgia, serif;
  font-style: italic;
  font-size: 13px;
  color: var(--ink-3);
  letter-spacing: 0.02em;
  margin-bottom: 6px;
}
.salut .body .greeting {
  font-family: "Cormorant Garamond", Georgia, serif;
  font-size: clamp(22px, 3.2vw, 32px);
  font-weight: 500;
  line-height: 1.2;
  letter-spacing: 0.005em;
}
.salut .body .greeting .nm {
  font-style: italic;
  text-decoration: underline;
  text-decoration-color: var(--sepia);
  text-underline-offset: 4px;
}
.salut .body .note {
  margin-top: 10px;
  font-size: 13px;
  color: var(--ink-2);
  max-width: 58ch;
  line-height: 1.55;
}
.salut .body .next {
  margin-top: 10px;
  display: inline-flex; gap: 10px; align-items: baseline;
  padding: 4px 10px;
  border: 1px solid var(--ink);
  background: var(--paper-3);
  font-family: "IBM Plex Mono", monospace;
  font-size: 11px;
  letter-spacing: 0.06em;
}
.salut .body .next b { color: var(--sepia-2); }

.salut .stamp {
  text-align: right;
  font-family: "IBM Plex Mono", monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--ink-3);
  text-transform: uppercase;
  line-height: 1.8;
}
.salut .stamp .date {
  font-family: "Cormorant Garamond", Georgia, serif;
  font-style: italic;
  font-size: 18px;
  color: var(--ink);
  letter-spacing: 0.01em;
}
.salut .stamp .circ {
  display: inline-block;
  border: 1.5px solid var(--red);
  padding: 2px 8px;
  color: var(--red);
  font-weight: 600;
  letter-spacing: 0.16em;
  margin-top: 4px;
  transform: rotate(-2deg);
}

/* ---- SECTION HEADERS ---- */
.sec-head {
  margin: 40px 0 18px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 14px;
  align-items: baseline;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--ink);
}
.sec-head .roman {
  font-family: "Cormorant Garamond", Georgia, serif;
  font-weight: 600;
  font-variant: small-caps;
  font-size: 15px;
  letter-spacing: 0.2em;
  color: var(--sepia);
}
.sec-head .t {
  font-family: "Cormorant Garamond", Georgia, serif;
  font-size: 26px;
  font-weight: 500;
  letter-spacing: 0.005em;
  line-height: 1;
}
.sec-head .t em {
  font-style: italic;
  color: var(--ink-2);
  font-weight: 400;
}
.sec-head .meta {
  font-family: "IBM Plex Mono", monospace;
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--ink-3);
  text-transform: uppercase;
}

/* ---- NOTICE (fall-behind banner) ---- */
.notice {
  padding: 16px 20px 18px;
  border: 1px solid var(--red);
  background: rgba(160,59,42,0.06);
  position: relative;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 20px;
  margin-top: 10px;
}
@media (max-width: 720px) { .notice { grid-template-columns: 1fr; } }
.notice::before {
  content: "";
  position: absolute; inset: 3px;
  border: 1px solid var(--red);
  pointer-events: none;
}
.notice .tag {
  position: absolute;
  top: -11px; left: 18px;
  background: var(--paper);
  padding: 0 10px;
  white-space: nowrap;
  font-family: "Cormorant Garamond", Georgia, serif;
  font-style: italic;
  font-size: 15px;
  color: var(--red);
  letter-spacing: 0.08em;
}
.notice h3 {
  margin: 4px 0 8px;
  font-family: "Cormorant Garamond", Georgia, serif;
  font-weight: 600;
  font-size: 22px;
  letter-spacing: 0.005em;
  line-height: 1.2;
}
.notice h3 em { color: var(--red); font-style: italic; }
.notice ul {
  margin: 0; padding: 0; list-style: none;
  font-size: 13px; color: var(--ink-2);
}
.notice ul li {
  padding: 3px 0;
  border-bottom: 1px dotted var(--ink-4);
  display: flex; align-items: baseline; gap: 10px;
}
.notice ul li:last-child { border-bottom: none; }
.notice ul li .rn {
  font-family: "IBM Plex Mono", monospace;
  font-size: 10px; letter-spacing: 0.12em;
  color: var(--sepia); flex: none; width: 28px;
}
.notice ul li b { color: var(--ink); font-weight: 600; }

.notice .dots {
  padding-left: 18px;
  border-left: 1px dotted var(--ink-3);
  display: flex; flex-direction: column; gap: 8px;
  min-width: 170px;
}
@media (max-width: 720px) { .notice .dots { border-left: none; padding-left: 0; padding-top: 10px; border-top: 1px dotted var(--ink-3); flex-direction: row; flex-wrap: wrap; } }
.notice .dots .row {
  display: grid;
  grid-template-columns: 24px 36px 1fr auto;
  gap: 8px;
  align-items: center;
  font-family: "IBM Plex Mono", monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
}
.notice .dots .dot {
  width: 10px; height: 10px; border-radius: 999px;
  background: var(--accent);
  border: 1px solid var(--ink);
}
.notice .dots .dot[data-state="ok"] { background: transparent; }
.notice .dots .code {
  font-weight: 600;
  color: var(--ink);
}
.notice .dots .sev {
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 0.14em;
}
.notice .dots .sev[data-state="ok"] { color: var(--ink-3); }

/* ---- METRIC TILES (ledger-style) ---- */
.ledger {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border: 1px solid var(--ink);
  background: var(--paper);
  margin-top: 8px;
}
@media (max-width: 820px) { .ledger { grid-template-columns: repeat(2, 1fr); } }

.ltile {
  padding: 14px 16px 16px;
  border-right: 1px solid var(--ink);
  position: relative;
  min-height: 136px;
  display: flex; flex-direction: column;
}
.ltile:last-child { border-right: none; }
@media (max-width: 820px) {
  .ltile:nth-child(2) { border-right: none; }
  .ltile:nth-child(-n+2) { border-bottom: 1px solid var(--ink); }
}
.ltile .topline {
  display: flex; align-items: center; gap: 8px;
  font-family: "IBM Plex Mono", monospace;
  font-size: 9.5px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-3);
  padding-bottom: 6px;
  border-bottom: 1px dotted var(--ink-4);
}
.ltile .topline .rn {
  color: var(--sepia);
  margin-right: auto;
}
.ltile .topline .lbl { color: var(--ink-2); font-weight: 600; }
.ltile .val {
  margin-top: 12px;
  font-family: "Cormorant Garamond", Georgia, serif;
  font-size: 48px;
  font-weight: 500;
  letter-spacing: -0.01em;
  line-height: 1;
  font-feature-settings: "tnum", "lnum";
}
.ltile .val .u {
  font-family: "Cormorant Garamond", Georgia, serif;
  font-style: italic;
  font-size: 15px;
  color: var(--ink-2);
  margin-left: 6px;
  font-weight: 400;
}
.ltile .hint {
  margin-top: auto;
  padding-top: 10px;
  font-size: 12px;
  color: var(--ink-2);
  line-height: 1.4;
  font-family: "Cormorant Garamond", Georgia, serif;
  font-style: italic;
}
.ltile[data-tone="critical"] .val { color: var(--red); }
.ltile[data-tone="warn"] .val     { color: var(--mustard); }
.ltile[data-tone="ok"] .val       { color: var(--green); }

/* ---- WEEKLY TABLEAU ---- */
.tableau {
  border: 1px solid var(--ink);
  background: var(--paper);
  overflow-x: auto;
  margin-top: 8px;
}
.tgrid {
  display: grid;
  grid-template-columns: 58px repeat(5, minmax(120px, 1fr));
  min-width: 680px;
  position: relative;
}
.th {
  padding: 12px 12px 10px;
  border-bottom: 2px solid var(--ink);
  border-right: 1px solid var(--ink);
  text-align: center;
}
.th:last-child { border-right: none; }
.th .dow {
  font-family: "Cormorant Garamond", Georgia, serif;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.06em;
  font-variant: small-caps;
}
.th .dn {
  font-family: "IBM Plex Mono", monospace;
  font-size: 10px;
  color: var(--ink-3);
  letter-spacing: 0.1em;
  margin-top: 2px;
}
.th.today { background: var(--paper-3); }
.th.today .dow { color: var(--sepia-2); }
.th.today .dn { color: var(--sepia-2); }
.th.corner {
  background: var(--paper-2);
}
.th.corner .dow { font-family: "IBM Plex Mono", monospace; font-size: 10px; letter-spacing: 0.14em; }

.rail {
  border-right: 1px solid var(--ink);
  position: relative;
}
.rail .hr {
  height: 46px;
  font-family: "IBM Plex Mono", monospace;
  font-size: 9.5px;
  color: var(--ink-3);
  text-align: right;
  padding-right: 6px;
  border-bottom: 1px dotted var(--ink-4);
  position: relative;
  letter-spacing: 0.04em;
}
.rail .hr span { position: absolute; top: -5px; right: 6px; background: var(--paper); padding: 0 3px; }

.tcol {
  position: relative;
  border-right: 1px solid var(--ink);
  min-height: 506px;
  background-image: repeating-linear-gradient(to bottom,
    transparent 0 45px,
    rgba(42,31,21,0.12) 45px 46px);
}
.tcol:last-child { border-right: none; }
.tcol.today {
  background-color: rgba(179,138,40,0.08);
}

.event {
  position: absolute;
  left: 5px; right: 5px;
  padding: 6px 8px 6px 10px;
  background: var(--paper);
  border: 1px solid var(--ink);
  border-left: 3px solid var(--accent);
  overflow: hidden;
  cursor: pointer;
  font-size: 11px;
  transition: background 120ms;
}
.event:hover { background: var(--paper-3); }
.event .tm {
  font-family: "IBM Plex Mono", monospace;
  font-size: 9.5px;
  letter-spacing: 0.06em;
  color: var(--ink-3);
}
.event .ttl {
  font-family: "Cormorant Garamond", Georgia, serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.005em;
  line-height: 1.1;
  margin-top: 1px;
}
.event .rm {
  font-family: "IBM Plex Mono", monospace;
  font-size: 9.5px;
  color: var(--ink-3);
  letter-spacing: 0.04em;
  margin-top: 2px;

  const pxh = 46, sH = 8;
  const toTop = hhmm => { const [h,m] = hhmm.split(":").map(Number); return (h + m/60 - sH) * pxh; };
  const toH = (a,b) => toTop(b) - toTop(a);
  const todayIdx = 2;
  const nowTop = toTop(`${pad(NOW.getHours())}:${pad(NOW.getMinutes())}`);
  const nowStr = `${pad(NOW.getHours())}:${pad(NOW.getMinutes())}`;
  const days = [
    { i:1, name:"Mon.", d:"20 Apr" },
    { i:2, name:"Tue.", d:"21 Apr" },
    { i:3, name:"Wed.", d:"22 Apr" },
    { i:4, name:"Thu.", d:"23 Apr" },
    { i:5, name:"Fri.", d:"24 Apr" },
  ];
  return (
    <div className="tableau">
      <div className="tgrid">
        <div className="th corner">
          <div className="dow">WK · XVII</div>
          <div className="dn">APR MMXXVI</div>
        </div>
        {days.map(day => (
          <div key={day.i} className={"th" + (day.i === todayIdx ? " today" : "")}>
            <div className="dow">{day.name}</div>
            <div className="dn">{day.d}</div>
          </div>
        ))}
        <div className="rail" style={{ height: hours.length * pxh }}>
          {hours.map(h => (
            <div key={h} className="hr" style={{ height: pxh }}>
              <span>{pad(h)}:00</span>
            </div>
          ))}
        </div>
        {days.map(day => (
          <div key={day.i} className={"tcol" + (day.i === todayIdx ? " today" : "")} style={{ height: hours.length * pxh }}>
            {day.i === todayIdx && <div className="nowrule" data-t={nowStr} style={{ top: nowTop }}/>}
            {SLOTS.filter(s => s.d === day.i).map((s, i) => (
              <div key={i} className="event"
                   style={{ top: toTop(s.s), height: toH(s.s, s.e) - 2, "--accent": cv(s.c) }}>
                <div className="tm">{s.s}–{s.e}</div>
                <div className="ttl"><span className="cc">{s.c}</span> · {s.k}</div>
                <div className="rm">— {s.r}</div>
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ===================== PLATES (courses) ===================== */
function Plates() {
  return (
    <div className="plates">
      {COURSES.map((c,i) => {
        const rt = relTime(c.next);
        return (
          <div key={c.code} className="plate-card" data-plate={c.plate} style={{ "--accent": cv(c.code) }}>
            <div className="code-band">
              <span className="seal">{c.code}</span>
              <span className="roman">{c.roman}</span>
              {c.behind > 0 ? <span className="flag">−{c.behind}</span> : <span className="flag" style={{ color:"var(--green)", borderColor:"var(--green)" }}>OK</span>}
            </div>
            <div className="tit">{c.full}</div>
            <div className="meta">{c.module} · {c.ects} ECTS · {c.lang}</div>
            <div className="next">Next lecture <b>{rt.label}</b></div>
            <div className="prog">
              <div className="bar"><div className="f" style={{ "--w": PROG[c.code] + "%" }}/></div>
              <div className="pct">{pad(PROG[c.code])}%</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ===================== DEADLINES + TASKS ===================== */
function Deadlines() {
  return (
    <div className="register">
      <div className="rhead">
        <span className="ti">Register of Deadlines</span>
        <span className="dek">— next three weeks</span>
        <span className="n">N = {String(DEADLINES.length).padStart(2,"0")}</span>
      </div>
      {DEADLINES.map((d,i) => {
        const rt = relTime(d.due);
        const t = new Date(d.due);
        const abs = `${pad(t.getDate())} ${t.toLocaleDateString("en-GB", { month: "short" })} · ${pad(t.getHours())}:${pad(t.getMinutes())}`;
        const roman = ["i","ii","iii","iv","v","vi","vii","viii"][i];
        return (
          <div key={d.id} className="ledrow">
            <span className="rnn">{roman}.</span>
            <span className="sealc" style={{ "--accent": cv(d.c) }}>{d.c}</span>
            <div style={{ minWidth: 0 }}>
              <div className="nm">{d.nm}</div>
              <div className="sub">{d.k} · {abs}</div>
            </div>
            <span className="stat" data-s={d.s}>{d.s.replace("_"," ")}</span>
            <span className="rt" data-sev={rt.sev}>{rt.label}</span>
          </div>
        );
      })}
    </div>
  );
}

function Tasks() {
  const [ck, setCk] = React.useState(() => Object.fromEntries(TASKS.map(t => [t.id, t.done])));
  return (
    <div className="register">
      <div className="rhead">
        <span className="ti">Inbox of Tasks</span>
        <span className="dek">— this week</span>
        <span className="n">N = {String(TASKS.filter(t => !ck[t.id]).length).padStart(2,"0")}</span>
      </div>
      {TASKS.map((t,i) => {
        const rt = relTime(t.due);
        const on = ck[t.id];
        const roman = ["i","ii","iii","iv","v","vi","vii","viii"][i];
        return (
          <div key={t.id} className="trow" style={{ opacity: on ? 0.55 : 1 }}>
            <span className="rnn" style={{ fontFamily:"IBM Plex Mono", fontSize:10, color:"var(--sepia)", letterSpacing:"0.1em", textAlign:"right" }}>{roman}.</span>
            <span className="chk" data-c={on} onClick={() => setCk(s => ({ ...s, [t.id]: !s[t.id] }))}/>
            <span className="sealc" style={{ "--accent": cv(t.c) }}>{t.c}</span>
            <div style={{ minWidth: 0 }}>
              <div className="nm" style={{ fontFamily:'"Cormorant Garamond", Georgia, serif', fontSize:14, fontWeight:600, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", textDecoration: on ? "line-through" : "none" }}>
                {t.t}
              </div>
            </div>
            <span className="rt" data-sev={rt.sev} style={{ fontFamily:'"IBM Plex Mono", monospace', fontSize:10.5, fontWeight:600, textAlign:"right", letterSpacing:"0.06em" }}>{rt.label}</span>
          </div>
        );
      })}
    </div>
  );
}

/* ===================== SECTION HEAD ===================== */
function SecHead({ rn, t, it, meta }) {
  return (
    <div className="sec-head">
      <div className="roman">§ {rn}</div>
      <div className="t">{t} <em>— {it}</em></div>
      <div className="meta">{meta}</div>
    </div>
  );
}

/* ===================== APP ===================== */
function App() {
  return (
    <div className="shell" data-screen-label="01 Dashboard — Register">
      <SideBar/>
      <div>
        <div className="mobtop">
          <b>SALEH REGISTER</b>
          <span className="sp"/>
          <span>WK <b>17</b> · SoSe '26</span>
        </div>
        <div className="page">
          <Masthead/>
          <Salutation/>

          <SecHead rn="I"   t="Notice" it="matters of overdue attention" meta="as of 21 apr · 09:27"/>
          <Notice/>

          <SecHead rn="II"  t="Ledger" it="the day's vital statistics" meta="four figures · aggregate"/>
          <Ledger/>

          <SecHead rn="III" t="Weekly Tableau" it="monday through friday" meta="9 engagements · wk xvii"/>
          <Tableau/>

          <SecHead rn="IV"  t="The Volumes" it="four courses, by plate" meta="27 ects · four modules"/>
          <Plates/>

          <SecHead rn="V"   t="Registers" it="deadlines & tasks in due course" meta="five · three open"/>
          <div className="twocol">
            <Deadlines/>
            <Tasks/>
          </div>

          <div className="colophon">
            <div className="orn">❦ · ❦ · ❦</div>
            <div>
              <b>Printed privately</b> at the editor's desk, Wuppertal · <b>MMXXVI</b>.<br/>
              Set in Cormorant Garamond &amp; Special Elegant. — <i>Not for circulation.</i>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
